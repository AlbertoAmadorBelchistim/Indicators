name-template: 'Semana $NEXT_MINOR_VERSION'
tag-template: 'v$NEXT_MINOR_VERSION'

template: |
  ## 📝 Resumen de Cambios
  $CHANGES

categories:
  - title: '🚀 Actualizaciones de Indicadores (Descargar DLL)'
    labels:
      - 'feature'
      - 'bug'
      - 'code'
  - title: '📚 Progreso de Auditoría y Documentación'
    labels:
      - 'documentation'
      - 'audit'
    collapse-after: 10

change-template: '- $TITLE @$AUTHOR'

autolabeler:
  - label: 'documentation'
    files:
      - 'docs/**/*.md'
      - '*.md'
      - 'docs/img/**/*'
      - 'docs/videos/**/*'
  - label: 'code'
    files:
      - 'MyIndicators/*.cs'
      - '**/*.dll'

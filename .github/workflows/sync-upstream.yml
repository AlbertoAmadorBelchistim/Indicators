name: 🔁 Sync upstream → origin (mirror)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: write   # necesario para push con GITHUB_TOKEN

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Init bare repo and fetch remotes
        run: |
          git init .
          git config user.name  "actions-sync-bot"
          git config user.email "actions@github"
          git remote add origin  https://github.com/${{ github.repository }}.git
          git remote add upstream https://github.com/AtasPlatform/Indicators.git
          git fetch upstream --prune --tags
          git fetch origin   --prune --tags

      - name: Mirror upstream → origin (excluding personal/protected)
        env:
          GH_USER: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ajusta: excluye tus ramas personales y protegidas (ojo a mayúsculas/minúsculas)
          EXCLUDE_REGEX: '^(my/|personal/|publish_.*_MyIndicators$|publish/docs$|publish_stable_MyIndicators$|Develop)$'
        run: |
          set -e
          # Lista de ramas en upstream (conserva el caso exacto)
          UPSTREAM_BRANCHES=$(git for-each-ref --format='%(refname:short)' refs/remotes/upstream/ | sed 's#^upstream/##')

          for BR in $UPSTREAM_BRANCHES; do
            if echo "$BR" | grep -Eq "$EXCLUDE_REGEX"; then
              echo "⏭  Skipping $BR (excluded)"
              continue
            fi

            echo "🔁 Syncing upstream/$BR → origin/$BR"

            # Refetch de origin justo antes de cada push para evitar 'stale info'
            git fetch origin --prune --tags

            # Empuje con lease sobre la ref remota actual
            git push --force-with-lease \
              "https://${GH_USER}:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
              "refs/remotes/upstream/$BR:refs/heads/$BR" \
              || echo "⚠️ Push failed for $BR (possibly branch protection); continuing…"
          done

      - name: Sync tags
        env:
          GH_USER: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push --tags "https://${GH_USER}:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"


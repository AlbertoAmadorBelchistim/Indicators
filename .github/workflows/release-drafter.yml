name: Release Drafter

on:
  push:
    branches:
      - publish_stable_MyIndicators # El robot trabaja cada vez que subes algo a publish
      # 👇 AÑADE ESTAS DOS LÍNEAS EXACTAS:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
